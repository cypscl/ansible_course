---
- name: Install & Configure Apache2 / MySQL Server
  hosts: all

  tasks:
    - name: Apt update
      ansible.builtin.apt:
        update_cache: true

    - name: Install Apache2 & MySQL
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - apache2
        - mysql-server


    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Check /var/www/index.html exists
      ansible.builtin.stat:
        path: /var/www/index.html
      register: apache2_index

    - name: Check & Create 'Hello World' index.html exists
      ansible.builtin.copy:
        dest: "/var/www/html/index.html"
        content: "<html><body><h1> Hello World from Ansible </h1></body></html>"
        mode: '0644'
      when:
        - "'apache2' in ansible_facts.packages"
        - not apache2_index.stat.exists

    - name: Start apache2
      ansible.builtin.service:
        name: apache2
        state: started
      when:
        - "'apache2' in ansible_facts.packages"
